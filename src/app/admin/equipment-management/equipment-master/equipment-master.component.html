<div class="container mb-4">
  <div class="d-flex justify-content-between align-items-center flex-wrap mb-4">
    <h1 class="text-primary table-heading-detail">Equipment Master (Categories)</h1>
    <div>
      <button class="btn btn-custom-primary px-4 py-2 me-2" (click)="openAddModal()">
        Add Category
      </button>
    </div>
  </div>

  <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
    <div class="col" *ngFor="let category of categories">
      <div class="card h-100 shadow-sm border-0 table-card p-3">
        <div class="card-body d-flex flex-column">
          <div class="d-flex justify-content-between align-items-start mb-3">
            <h5 class="card-title fw-bold text-primary mb-0">{{ category.name }}</h5>
            <span class="badge" [ngClass]="category.isActive ? 'bg-success' : 'bg-danger'">
              {{ category.isActive ? 'Active' : 'Inactive' }}
            </span>
          </div>
          <div class="mt-auto d-flex justify-content-between align-items-center">
            <button class="btn btn-sm btn-outline-primary" (click)="openEditModal(category)">
              <i class="fa-solid fa-edit me-1"></i> Edit
            </button>
            <button class="btn btn-sm" [ngClass]="category.isActive ? 'btn-outline-danger' : 'btn-outline-success'" (click)="toggleActiveStatus(category)">
              <i class="fa-solid" [ngClass]="category.isActive ? 'fa-ban' : 'fa-check-circle'"></i>
              {{ category.isActive ? 'Deactivate' : 'Activate' }}
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal for Add/Edit -->
<div *ngIf="isModalOpen" class="modal-container">
  <div class="bg-white rounded-3 shadow-lg d-flex flex-column" style="width: 500px; max-width: 90%;">
    <div class="modal-header-custom px-4 py-3 d-flex justify-content-between align-items-center border-bottom">
      <h4 class="mb-0 text-primary fw-bold">{{ isEditMode ? 'Edit Category' : 'Add New Category' }}</h4>
      <button class="btn bg-transparent border-0 p-0" (click)="closeModal()">
        <i class="fa-solid fa-xmark fs-4 text-muted"></i>
      </button>
    </div>

    <form [formGroup]="categoryForm" (ngSubmit)="saveCategory()">
      <div class="modal-body-custom px-4 py-4">
        <div class="mb-3">
          <label class="form-label form-lable-custom">Category Name *</label>
          <input type="text" class="form-control form-input-custom" formControlName="name" [ngClass]="{'is-invalid': categoryForm.get('name')?.invalid && categoryForm.get('name')?.touched}">
          <div class="invalid-feedback">Category Name is required.</div>
        </div>

      </div>
      <div class="px-4 py-3 border-top bg-light text-end">
        <button class="btn btn-secondary px-4 py-2 me-3" type="button" (click)="closeModal()">Cancel</button>
        <button class="btn btn-custom-primary px-4 py-2" type="submit">
          {{ isEditMode ? 'Update' : 'Save' }}
        </button>
      </div>
    </form>
  </div>
</div>
